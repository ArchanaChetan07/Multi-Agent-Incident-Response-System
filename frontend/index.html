<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Incident Response Triage Dashboard</title>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --accent:#38bdf8; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --text:#e2e8f0; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:var(--bg); color:var(--text); }
  header { padding:20px 28px; border-bottom:1px solid #334155; }
  header h1 { margin:0; font-size:20px; }
  header p { margin:4px 0 0; color:#94a3b8; font-size:13px; }
  .layout { display:grid; grid-template-columns: 300px 1fr; gap:0; height: calc(100vh - 78px); }
  .list { border-right:1px solid #334155; overflow-y:auto; padding:12px; }
  .card { background:var(--panel); border:1px solid #334155; border-radius:8px; padding:12px 14px; margin-bottom:10px; cursor:pointer; transition:.15s; }
  .card:hover { border-color: var(--accent); }
  .card.active { border-color: var(--accent); background:#1e2b40; }
  .badge { font-size:11px; padding:2px 8px; border-radius:10px; font-weight:600; }
  .badge.adv { background:#7f1d1d; color:#fecaca; }
  .badge.norm { background:#14532d; color:#bbf7d0; }
  .detail { padding:24px 32px; overflow-y:auto; }
  .empty { color:#64748b; margin-top:60px; text-align:center; }
  button.run { background:var(--accent); color:#0f172a; border:none; padding:10px 18px; border-radius:6px; font-weight:700; cursor:pointer; }
  button.run:disabled { opacity:.5; cursor:default; }
  .report { margin-top:20px; }
  .row { display:flex; gap:16px; margin-bottom:14px; flex-wrap:wrap; }
  .stat { background:var(--panel); border:1px solid #334155; border-radius:8px; padding:12px 16px; min-width:150px; }
  .stat .label { font-size:11px; color:#94a3b8; text-transform:uppercase; letter-spacing:.05em; }
  .stat .value { font-size:20px; font-weight:700; margin-top:4px; }
  .verdict-accept { color:var(--ok); }
  .verdict-reject { color:var(--bad); }
  .evidence { background:#0b1220; border:1px solid #334155; border-radius:8px; padding:14px; font-family: ui-monospace, monospace; font-size:12.5px; white-space:pre-wrap; }
  .escalated { color:var(--warn); font-weight:600; }
  .steps { display:flex; gap:8px; margin:16px 0; }
  .step { flex:1; text-align:center; padding:10px; border-radius:8px; background:var(--panel); border:1px solid #334155; font-size:13px; }
  .step.done { border-color: var(--ok); }
</style>
</head>
<body>
<header>
  <h1>🛰️ Multi-Agent Incident Response — Triage Dashboard</h1>
  <p>Planner → Executor → Critic, with cost-aware routing and hallucination guarding</p>
</header>
<div class="layout">
  <div class="list" id="list"></div>
  <div class="detail" id="detail"><div class="empty">Select an incident to begin investigation →</div></div>
</div>

<script>
const API_BASE = window.API_BASE || "http://127.0.0.1:8000";
let incidents = [];
let selected = null;

async function loadIncidents() {
  const res = await fetch(`${API_BASE}/incidents`);
  incidents = await res.json();
  renderList();
}

function renderList() {
  const list = document.getElementById('list');
  list.innerHTML = incidents.map(i => `
    <div class="card ${selected===i.id?'active':''}" onclick="selectIncident('${i.id}')">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <strong>${i.id}</strong>
        <span class="badge ${i.is_adversarial?'adv':'norm'}">${i.is_adversarial?'adversarial':'legit'}</span>
      </div>
    </div>
  `).join('');
}

async function selectIncident(id) {
  selected = id;
  renderList();
  const detail = document.getElementById('detail');
  detail.innerHTML = `
    <h2>${id}</h2>
    <div class="steps">
      <div class="step" id="step-plan">📋 Planner</div>
      <div class="step" id="step-exec">🔧 Executor</div>
      <div class="step" id="step-critic">🧐 Critic</div>
    </div>
    <button class="run" id="runBtn" onclick="runInvestigation('${id}')">Run Investigation</button>
    <div id="report"></div>
  `;
}

async function runInvestigation(id) {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Investigating…';
  ['step-plan','step-exec','step-critic'].forEach((s,idx)=>{
    setTimeout(()=>document.getElementById(s).classList.add('done'), (idx+1)*300);
  });

  const res = await fetch(`${API_BASE}/incidents/${id}/investigate`, {method:'POST'});
  const report = await res.json();
  btn.textContent = 'Re-run Investigation';
  btn.disabled = false;
  renderReport(report);
}

function renderReport(r) {
  const verdictClass = r.verdict === 'accept' ? 'verdict-accept' : 'verdict-reject';
  document.getElementById('report').innerHTML = `
    <div class="report">
      <div class="row">
        <div class="stat"><div class="label">Verdict</div><div class="value ${verdictClass}">${r.verdict.toUpperCase()}</div></div>
        <div class="stat"><div class="label">Confidence</div><div class="value">${(r.confidence*100).toFixed(0)}%</div></div>
        <div class="stat"><div class="label">Cost</div><div class="value">$${r.cost_usd.toFixed(5)}</div></div>
        <div class="stat"><div class="label">Savings vs baseline</div><div class="value">${r.cost_savings_pct}%</div></div>
        ${r.escalated_to_strong_model ? '<div class="stat"><div class="label">Routing</div><div class="value escalated">⬆ Escalated</div></div>' : ''}
      </div>
      <h3>Root Cause</h3>
      <div class="evidence">${r.root_cause || '⚠️ No root cause asserted — evidence was rejected as unreliable.'}

Critic reasoning: ${r.critic_reason}

Evidence:
${(r.evidence||[]).map(e=>'• '+e).join('\n')}</div>
    </div>
  `;
}

loadIncidents();
</script>
</body>
</html>
